<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shortcuts App</title>
  <link href="./styles/style.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-sm navbar-dark sticky-top p-0">
    <div class="container-fluid flex-column align-items-stretch px-0">

      <div class="w-100 px-3 py-2 d-flex align-items-center">
        <a class="navbar-brand fw-bold mb-0">shortcuts!</a>
      </div>

      <!-- Search -->
      <div class="bg-light border-top py-3">
        <div class="container">
          <input 
            id="searchBox" 
            class="form-control form-control-lg rounded-pill" 
            type="search"
            placeholder="search for shortcuts..."
          >
        </div>
      </div>

    </div>
  </nav>

  <h1 class="m-3 text-center">Shortcuts</h1>

  <!-- Grid -->
  <div class="container my-4">
    <div id="shortcutGrid" class="row g-3"></div>
  </div>

  <!-- Footer -->
  <footer class="mt-auto py-3 bg-light border-top text-center">
    <small class="text-muted">&copy; 2026 Shortcuts App</small>
  </footer>

  <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script> -->
  <script src="scripts/shortcut.js"></script>
  <script src="scripts/search.js"></script>

</body>
</html>
